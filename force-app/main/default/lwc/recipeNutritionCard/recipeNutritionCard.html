<template>
    <section class="nutrition-card">
        <div class="card-header">
            <div>
                <div class="eyebrow">Per Serving</div>
                <h2>Nutrition Facts</h2>
            </div>
        </div>

        <div class="macro-grid">
            <div class="macro calories">
                <div class="icon">🔥</div>
                <div class="value">{calories}</div>
                <div class="label">Calories</div>
            </div>

            <div class="macro protein">
                <div class="icon">💪</div>
                <div class="value">{protein}g</div>
                <div class="label">Protein</div>
            </div>

            <div class="macro carbs">
                <div class="icon">🍞</div>
                <div class="value">{carbs}g</div>
                <div class="label">Carbs</div>
            </div>

            <div class="macro fat">
                <div class="icon">🥑</div>
                <div class="value">{fat}g</div>
                <div class="label">Fat</div>
            </div>

            <div class="macro fiber">
                <div class="icon">🌾</div>
                <div class="value">{fiber}g</div>
                <div class="label">Fiber</div>
            </div>
        </div>
    </section>
</template>
